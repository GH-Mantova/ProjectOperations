name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Deterministic 32-byte hex key used solely for CI tests. Real
  # production keys live in Azure Key Vault and are never committed.
  BYOK_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  # Opt-in to Node 24 runtime for JavaScript actions ahead of GitHub's
  # 2026-06-16 Node 20 → 24 force-migration deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api:
    name: API — lint, test, compliance smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: project_ops
          POSTGRES_PASSWORD: project_ops
          POSTGRES_DB: project_operations
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.0.0
      - uses: actions/setup-node@v4.1.0
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @project-ops/api exec puppeteer browsers install chrome
      - run: pnpm prisma:generate
        env:
          DATABASE_URL: postgresql://project_ops:project_ops@localhost:5432/project_operations?schema=public
      - run: pnpm prisma:migrate
        env:
          DATABASE_URL: postgresql://project_ops:project_ops@localhost:5432/project_operations?schema=public
      - run: pnpm seed
        env:
          DATABASE_URL: postgresql://project_ops:project_ops@localhost:5432/project_operations?schema=public
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          SHAREPOINT_MODE: mock
      - run: pnpm --filter @project-ops/api lint
      - run: pnpm test:api:serial
        env:
          DATABASE_URL: postgresql://project_ops:project_ops@localhost:5432/project_operations?schema=public
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          SHAREPOINT_MODE: mock
      - run: pnpm compliance:smoke
        env:
          DATABASE_URL: postgresql://project_ops:project_ops@localhost:5432/project_operations?schema=public
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          SHAREPOINT_MODE: mock
      - run: pnpm test:canonical
        env:
          DATABASE_URL: postgresql://project_ops:project_ops@localhost:5432/project_operations?schema=public
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          SHAREPOINT_MODE: mock

  data-model-drift:
    name: Data model — generator sanity (schema.prisma parses cleanly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.1.0
        with: { node-version: '22' }
      - name: Run relationship-map generator against schema.prisma
        # The JSON/MD outputs are gitignored (they churned every PR when committed).
        # This gate re-runs the generator fresh and fails only if it errors or
        # cannot resolve a model/enum reference in schema.prisma.
        run: node scripts/data-model/build-relationship-map.mjs --check

  pr-gates:
    name: PR gates — diff checks (CP-09–13, CP-17, CP-22, CP-23)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4.1.0
        with: { node-version: '22' }
      - run: node scripts/pr-gates/pr-gates.mjs
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}

  web:
    name: Web — lint, logic tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.0.0
      - uses: actions/setup-node@v4.1.0
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @project-ops/web lint
      - run: pnpm test:web:logic
      - run: pnpm --filter @project-ops/web build
        env:
          VITE_API_BASE_URL: http://localhost:3000/api/v1
