name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Deterministic 32-byte hex key used solely for CI tests. Real
  # production keys live in Azure Key Vault and are never committed.
  BYOK_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  # Opt-in to Node 24 runtime for JavaScript actions ahead of GitHub's
  # 2026-06-16 Node 20 → 24 force-migration deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api:
    name: API — lint, test, compliance smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: project_ops
          POSTGRES_PASSWORD: project_ops
          POSTGRES_DB: project_operations
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.0.0
      - uses: actions/setup-node@v4.1.0
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @project-ops/api exec puppeteer browsers install chrome
      - run: pnpm prisma:generate
        env:
          DATABASE_URL: postgresql://project_ops:project_ops@localhost:5432/project_operations?schema=public
      - run: pnpm prisma:migrate
        env:
          DATABASE_URL: postgresql://project_ops:project_ops@localhost:5432/project_operations?schema=public
      - run: pnpm seed
        env:
          DATABASE_URL: postgresql://project_ops:project_ops@localhost:5432/project_operations?schema=public
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          SHAREPOINT_MODE: mock
      - run: pnpm --filter @project-ops/api lint
      - run: pnpm test:api:serial
        env:
          DATABASE_URL: postgresql://project_ops:project_ops@localhost:5432/project_operations?schema=public
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          SHAREPOINT_MODE: mock
      - run: pnpm compliance:smoke
        env:
          DATABASE_URL: postgresql://project_ops:project_ops@localhost:5432/project_operations?schema=public
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          SHAREPOINT_MODE: mock

  web:
    name: Web — lint, logic tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.0.0
      - uses: actions/setup-node@v4.1.0
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @project-ops/web lint
      - run: pnpm test:web:logic
      - run: pnpm --filter @project-ops/web build
        env:
          VITE_API_BASE_URL: http://localhost:3000/api/v1
