name: Deploy

permissions:
  contents: read

# Triggered ONLY by workflow_dispatch (manual). Push events do NOT
# trigger this workflow. Re-enable on: push: { branches: [main] }
# only after Azure secrets are configured and ready for live deploy.
# See progress.md 2026-04-27 + pre-deploy-checklist.md §6 for context.

on:
  workflow_dispatch:

env:
  # Opt-in to Node 24 runtime for JavaScript actions ahead of GitHub's
  # 2026-06-16 Node 20 → 24 force-migration deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build and deploy
    # Defensive guard: keeps any non-dispatch run skipping cleanly. When
    # on: push is re-enabled per pre-deploy-checklist.md §6, this gate
    # should be widened or removed. (The 0s phantom push failures this
    # was added for were actually caused by `secrets` in a step-level
    # `if:` — invalid context, see LL-11 — fixed via HAS_PROD_DATABASE_URL.)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      # `secrets` is not available in step-level `if:` expressions —
      # referencing it there fails workflow-file validation and produced
      # a 0s failed run on every push (LL-11). Evaluate it here instead.
      HAS_PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.0.0
      - uses: actions/setup-node@v4.1.0
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @project-ops/api exec prisma generate
      - name: Run database migrations
        if: ${{ env.HAS_PROD_DATABASE_URL == 'true' }}
        run: pnpm --filter @project-ops/api exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      - run: pnpm build:azure
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
      # apps/api/node_modules are pnpm workspace symlinks into the repo-root
      # store — copying apps/api alone ships broken links and the app
      # crash-loops with MODULE_NOT_FOUND (G11). Build a self-contained
      # bundle instead: --legacy because the API has no workspace:* deps
      # (inject-workspace-packages not needed), node-linker=hoisted so
      # node_modules are physical files (symlinks do not survive zip deploy).
      - name: Create self-contained API bundle
        run: pnpm --filter @project-ops/api deploy --prod --legacy --config.node-linker=hoisted deploy-api
      # The bundle's node_modules come from a fresh install, so the Prisma
      # client generated earlier (root store) is not in it. Regenerate
      # against the bundled schema; output lands in deploy-api/node_modules.
      - name: Generate Prisma client into bundle
        run: pnpm --filter @project-ops/api exec prisma generate --schema ../../deploy-api/prisma/schema.prisma
      - name: Smoke-probe bundle before deploy
        run: |
          node -e "require('./deploy-api/node_modules/@nestjs/config/package.json'); console.log('bundle deps OK')"
          node -e "require('./deploy-api/node_modules/.prisma/client/package.json'); console.log('prisma client OK')"
          test -f deploy-api/dist/src/main.js && echo "dist entry OK"
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: deploy-api
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web/dist
