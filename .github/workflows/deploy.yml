name: Deploy

permissions:
  contents: read

# DISABLED — manual trigger only. See on: block below.
# Re-enable on: push when production deployment is ready.

on:
  workflow_dispatch:
    # Manual-only until production deployment is wired up.
    # Re-enable push trigger after Azure secrets are configured
    # and tendering module is signed off (roadmap §5A).
    # See progress.md 2026-04-27 for context.

env:
  # Opt-in to Node 24 runtime for JavaScript actions ahead of GitHub's
  # 2026-06-16 Node 20 → 24 force-migration deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.0.0
      - uses: actions/setup-node@v4.1.0
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @project-ops/api exec prisma generate
      - name: Run database migrations
        if: ${{ secrets.PROD_DATABASE_URL != '' }}
        run: pnpm --filter @project-ops/api exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      - run: pnpm build:azure
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: apps/api
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web/dist
