name: Deploy

permissions:
  contents: read

# Production deploy pipeline (G11 hardening, pr-174):
#
#   install → prisma generate → migrate deploy (prod DB, fails on drift)
#   → build (web bundle gets VITE_* SSO vars baked in) → self-contained
#   API bundle + smoke probe → deploy API (App Service) → API health gate
#   (poll /health, 12×10s, fail loudly on red) → deploy web (SWA)
#   → SWA reachability gate (root must return 200).
#
# VARIANT NOTE: this is the health-gate-only variant, NOT slot+swap.
# The workflow authenticates with publish profiles only — slot swap
# requires `az` CLI credentials (service principal / OIDC) plus a
# Standard+ App Service plan and a slot publish profile, none of which
# exist yet. Until then a bad deploy IS live until rolled back, but the
# health gate fails the run loudly so it is never silently broken.
# Follow-up (Marco, portal): upgrade plan tier, create `staging` slot,
# add slot publish profile + AZURE_CREDENTIALS, then convert the API
# deploy to deploy-to-slot → health-gate → swap.
#
# Triggers: push to main (re-enabled 2026-06-12 per
# pre-deploy-checklist.md §6 — secrets are configured and the pipeline
# has deployed green) + workflow_dispatch for manual/rollback runs.
# Rapid merges queue (concurrency group), never race or cancel.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  # Opt-in to Node 24 runtime for JavaScript actions ahead of GitHub's
  # 2026-06-16 Node 20 → 24 force-migration deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    env:
      # `secrets` is not available in step-level `if:` expressions —
      # referencing it there fails workflow-file validation and produced
      # a 0s failed run on every push (LL-11). Evaluate it here instead.
      HAS_PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4.2.2
      # Short SHA is used as the build identity across surfaces:
      #   * baked into the web bundle via VITE_BUILD_SHA (buildInfo.ts,
      #     version.json, X-Client-Version header)
      #   * set as GIT_SHA on the API App Service so /health.commit and
      #     /version.commit report the real running commit instead of
      #     "unknown".
      - name: Compute build SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4.0.0
      - uses: actions/setup-node@v4.1.0
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @project-ops/api exec prisma generate
      # This is a production pipeline: deploying code without running
      # migrations ships code ahead of schema (CP-07's failure class).
      # Fail loudly instead of silently skipping.
      - name: Require PROD_DATABASE_URL
        if: ${{ env.HAS_PROD_DATABASE_URL != 'true' }}
        run: |
          echo "::error::PROD_DATABASE_URL secret is not set — refusing to deploy code without running migrations against the production database."
          exit 1
      - name: Run database migrations
        run: pnpm --filter @project-ops/api exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      # Vite bakes VITE_* vars into the bundle at BUILD time — setting
      # them in the SWA portal does nothing (pre-deploy-checklist.md §3).
      # msal.config.ts disables SSO if VITE_ENTRA_* are empty, so this is
      # inert until the PROD_ENTRA_* repo secrets are created.
      - run: pnpm build:azure
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          VITE_SSO_ENABLED: 'true'
          VITE_ENTRA_CLIENT_ID: ${{ secrets.PROD_ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID: ${{ secrets.PROD_ENTRA_TENANT_ID }}
          # Baked into buildInfo.ts + version.json + X-Client-Version.
          VITE_BUILD_SHA: ${{ steps.sha.outputs.short }}
      # apps/api/node_modules are pnpm workspace symlinks into the repo-root
      # store — copying apps/api alone ships broken links and the app
      # crash-loops with MODULE_NOT_FOUND (G11). Build a self-contained
      # bundle instead: --legacy because the API has no workspace:* deps
      # (inject-workspace-packages not needed), node-linker=hoisted so
      # node_modules are physical files (symlinks do not survive zip deploy).
      - name: Create self-contained API bundle
        run: pnpm --filter @project-ops/api deploy --prod --legacy --config.node-linker=hoisted deploy-api
      # The bundle's node_modules come from a fresh install, so the Prisma
      # client generated earlier (root store) is not in it. Regenerate
      # against the bundled schema; output lands in deploy-api/node_modules.
      - name: Generate Prisma client into bundle
        run: pnpm --filter @project-ops/api exec prisma generate --schema ../../deploy-api/prisma/schema.prisma
      # App Service Node reads .env at app root (ConfigModule.forRoot in
      # apps/api/src/app.module.ts). Writing GIT_SHA here is the least-risky
      # way to advertise the running commit without adding az-cli/OIDC to
      # this workflow. All other secrets (DATABASE_URL, JWT_*, etc.) still
      # come from portal-managed application settings.
      - name: Stamp API bundle with GIT_SHA
        run: echo "GIT_SHA=${{ steps.sha.outputs.short }}" > deploy-api/.env
      - name: Smoke-probe bundle before deploy
        run: |
          node -e "require('./deploy-api/node_modules/@nestjs/config/package.json'); console.log('bundle deps OK')"
          node -e "require('./deploy-api/node_modules/.prisma/client/package.json'); console.log('prisma client OK')"
          test -f deploy-api/dist/src/main.js && echo "dist entry OK"
      - name: Deploy API to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: deploy-api
      - name: API health gate
        env:
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
        run: |
          HEALTH_URL="${PROD_API_BASE_URL%/}/health"
          echo "Polling API health endpoint (12 attempts, 10s apart)"
          for i in $(seq 1 12); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" || echo "000")
            echo "Attempt $i/12: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "API health gate PASSED"
              exit 0
            fi
            sleep 10
          done
          echo "::error::API health gate FAILED — /api/v1/health never returned 200 after 12 attempts. The deployed API is unhealthy; check App Service Log stream (see runbook §4 troubleshooting / MODULE_NOT_FOUND playbook)."
          exit 1
      - name: Deploy web to Static Web Apps
        id: swa-deploy
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1  # commit dated 2024-09-11 "Update action.yml (#27)"; pinned off floating @v1 — see PR body
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web/dist
      - name: Static Web App reachability gate
        env:
          SWA_URL: ${{ steps.swa-deploy.outputs.static_web_app_url }}
        run: |
          if [ -z "$SWA_URL" ]; then
            echo "::error::SWA deploy step returned no static_web_app_url output — cannot verify the deployment."
            exit 1
          fi
          echo "Polling Static Web App root (6 attempts, 10s apart)"
          for i in $(seq 1 6); do
            code=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 10 "$SWA_URL" || echo "000")
            echo "Attempt $i/6: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "SWA reachability gate PASSED"
              exit 0
            fi
            sleep 10
          done
          echo "::error::SWA reachability gate FAILED — the Static Web App root never returned 200 after 6 attempts."
          exit 1
