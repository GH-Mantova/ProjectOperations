<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Operations Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script>
      // Apply persisted theme before first paint so tokens resolve correctly
      // and users don't see a flash of the wrong theme. Mirrors the storage
      // key in src/lib/theme.ts.
      (function () {
        try {
          var v = localStorage.getItem("projectops.theme");
          if (v === "light" || v === "dark") {
            document.documentElement.setAttribute("data-theme", v);
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
