services:
  postgres:
    image: postgres:16-alpine
    container_name: project-operations-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_operations}
      POSTGRES_USER: ${POSTGRES_USER:-project_ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-project_ops}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-project_ops} -d ${POSTGRES_DB:-project_operations}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
