  - id: graphify-knowledge-graph
    title: "Graphify knowledge graph -- blocked on PATH, not on code"
    priority: P4
    why: >
      Blocked because the watcher's shell does not resolve the graphify binary
      (C:\Users\Marco\.local\bin is not on its PATH). This is an ENVIRONMENT blocker, not a code
      one, so it cannot clear itself -- the gate below only exits 0 once graphify actually resolves.
      Prompt body is in the untracked HOLD file pr-graphify-setup-HOLD.md (size 10).
    gate: 'command -v graphify > /dev/null 2>&1 && ! test -f .graphifyignore'
    gate_means: The graphify binary resolves in the agent's shell AND the graph has not been built yet.
    needs_marco: false
    order: 18

