  - id: split-native-browser-dialogs
    title: "Replace native browser dialogs ÔÇö SPLIT into 4 prompts (the original blew the turn cap)"
    priority: P2
    why: >
      `pr-replace-native-browser-dialogs` tried to migrate 48 call sites in ONE run. It hit
      "Reached max turns (240)" ÔÇö DOUBLE the normal budget ÔÇö left 33 uncommitted files in the shared
      tree, and killed the queue for 13 hours. It sits in `failed/` and nobody owns it.
      RAISING THE TURN CAP DOES NOT HELP. SPLITTING DOES. This is also exactly why the intake lint
      rejects `size > 10`. Rewrite it as ~4 prompts, each under the cap, each independently shippable.
    gate: 'grep -rq "window.confirm\|window.alert" apps/web/src'
    gate_means: Native browser dialogs are still in the web app.
    needs_marco: false
    order: 12

