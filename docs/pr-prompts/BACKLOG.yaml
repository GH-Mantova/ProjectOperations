# =============================================================================================
# THE BACKLOG REGISTER ГѓвЂќГѓвЂЎГѓВ¶ work that is REAL but NOT YET IN THE QUEUE.
#
# WHY THIS EXISTS
# ---------------
# On 2026-07-14 an audit found SEVEN pieces of designed work that had quietly fallen on the floor.
# They lived in CHAT MEMORIES ГѓвЂќГѓвЂЎГѓВ¶ which no agent can read ГѓвЂќГѓвЂЎГѓВ¶ or in a HOLD file nobody re-evaluated.
#
# The worst case: the **Branding manager** was HOLD-gated on the quote-PDF fix. That fix MERGED on
# 2026-07-08. The gate released SIX DAYS EARLIER and nothing noticed, because a HOLD is a passive
# note ГѓвЂќГѓвЂЎГѓВ¶ something has to come back and ASK "is it unblocked yet?" Nothing ever did.
# Meanwhile `AdminCompanyPage.tsx` still ships a comment promising the tables.
#
# Second worst: `pr-524` names `pr-rates-b2-ratetable-canonical-cutover` as its precondition.
# THAT PROMPT WAS NEVER WRITTEN. An entire workstream was blocked on a step that did not exist.
#
# HOW IT WORKS ГѓвЂќГѓвЂЎГѓВ¶ the gate is EXECUTABLE, exactly like the lint's `premise`
# -----------------------------------------------------------------------
#   gate:        a shell command. EXIT 0 => the blocker is GONE and this item is READY TO STAGE.
#   gate_means:  plain English, so a human can sanity-check the command.
#   needs_marco: true  => a decision only Marco can make. NEVER auto-stage. Surface it, and stop.
#
# `scripts/pipeline/check-backlog.mjs` runs every gate against `main`. **STATION 04-SCANNER runs it
# every 4 hours** and reports anything that just became ready. That is the whole point: a blocker
# that clears must be NOTICED, not waited on.
#
#   > If you cannot express the gate as a command, you do not understand the blocker well enough.
#   > (Same rule as the lint's premise. It is not a formality.)
#
# RULES
# -----
# * Add an item here THE MOMENT it is discussed and not immediately staged. Chat memory is NOT a
#   backlog ГѓвЂќГѓвЂЎГѓВ¶ agents cannot read it, and it is where these seven items went to die.
# * `needs_marco: true` items are NEVER auto-staged. The scanner surfaces them; Marco decides.
# * When an item IS staged, delete it here. The queue is then its home. One place, never two.
# * A GATE MUST BE ABLE TO FAIL. The literal word `true` is not a gate; nor is a command that
#   ends in a `[space][pipe][pipe][space]true` swallow-the-error suffix. Both always exit 0 and
#   can never notice that the work is done ГѓвЂќГѓвЂЎГѓВ¶ which is the entire job of this file. If you cannot
#   express the blocker as a command that EXITS NON-ZERO once the work has shipped, you do not
#   understand the item well enough to register it. On 2026-07-14 the P0 tender-PATCH item sat
#   at the top of this register as READY for a full day after PR #577 fixed it, because its
#   gate was set to always-pass.
# =============================================================================================

