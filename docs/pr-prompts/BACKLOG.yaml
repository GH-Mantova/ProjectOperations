      AZURE/ENTRA IS YOUR HARD STOP -- nothing touches it without you. This PR is buildable, but it
      must not be deployed or verified without your supervision. And do NOT delete the old
      app-registration secrets until a real email is confirmed delivered. Ready to supervise it?
