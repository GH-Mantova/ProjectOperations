  - id: siteid-notnull-backfill
    title: "Enforce siteId NOT NULL on Tender/Job/FormSubmission/Project (backfill first)"
    priority: P3
    why: >
      siteId is still nullable across Tender/Job/FormSubmission/Project. Enforcing NOT NULL needs a
      data backfill FIRST -- and any row with no resolvable site blocks the migration. That makes it
      a production-data change, not just a schema one. The HOLD file carries watcher:do-not-arm.
      Prompt body is in the untracked HOLD file pr-siteid-notnull-backfill-HOLD.md
      (size 8, gate_allow migrations).
    gate: 'grep -qE "^[[:space:]]+siteId[[:space:]]+String\?" apps/api/prisma/schema.prisma'
    gate_means: siteId is still nullable -- NOT NULL has not been enforced.
    needs_marco: true
    marco_question: >
      This backfills PRODUCTION data and then locks the column. What should rows with no site
      resolve to -- a default site, or do they get fixed by hand first? I will not guess this.
    order: 20
